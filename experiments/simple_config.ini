[General]
save_dir = ./runs
materials_path = src/coatopt/config/materials.json
run_name = test1
# Optional: experiment_name = 20layer-0.1-0.5

[Data]
n_layers = 20
min_thickness = 0.1
max_thickness = 0.5
optimise_parameters = reflectivity, absorption
optimise_targets = {"reflectivity": 1.0, "absorption": 0.0}
objective_bounds = {"reflectivity": [0.9, 0.99999],
                    "absorption": [1e3, 1e-1]}s
constraint_schedule = interleaved

[sb3_discrete]
total_timesteps = 100000
n_thickness_bins = 20
epochs_per_step = 200
steps_per_objective = 10
constraint_penalty = 10.0
mask_consecutive_materials = True

[Algorithm]
# PPO hyperparameters
learning_rate = 3e-4
batch_size = 64
n_epochs = 10
ent_coef = 0.01
net_arch_pi = [256, 256]
net_arch_vf = [256, 256]

[sac_hybrid]
n_agents              = 6
total_timesteps       = 300000
warmup_episodes       = 100
buffer_size           = 100000
batch_size            = 256
train_every           = 1
constraint_penalty    = 10.0
lr                    = 3e-4
gamma                 = 0.99
tau                   = 0.005
hidden                = [256, 256]
min_layers_before_air = 4
seed                  = 42
verbose               = 1
explore_eps                = 0.2
constraint_noise           = 0.05
clear_buffer_on_warmup_end = true
log_freq   = 500
plot_freq  = 5000

[sac_multiagent]
n_agents              = 6
total_timesteps       = 300000
warmup_episodes       = 100
n_thickness_bins      = 20
buffer_size           = 100000
batch_size            = 256
train_every           = 1
constraint_penalty    = 10.0
lr                    = 3e-4
gamma                 = 0.99
tau                   = 0.005
hidden                = [256, 256]
min_layers_before_air = 4
seed                  = 42
verbose               = 1
# Exploration
explore_eps                = 0.2   ; random-action prob during warmup
constraint_noise           = 0.05  ; per-episode jitter on constraint thresholds (fraction std)
clear_buffer_on_warmup_end = true  ; discard warmup transitions before constrained phase
# Monitoring
log_freq   = 500    ; log to MLflow every N env steps
plot_freq  = 5000   ; save Pareto plot every N env steps

[morl_discrete]
# Sub-algorithm: gpipd | envelope | pcn
sub_algorithm = gpipd
total_timesteps = 500000
seed = 42
verbose = 1
eval_freq = 10000
print_freq = 200
# Action space
n_thickness_bins = 20
# Masking
mask_consecutive_materials = true
mask_air_until_min_layers = true
min_layers_before_air = 4
consecutive_penalty = 0.1
# Network
net_arch = [256, 256]
# Q-learning shared (gpipd / envelope)
gamma = 0.99
learning_rate = 3e-4
batch_size = 256
buffer_size = 100000
target_net_update_freq = 200
tau = 1.0
epsilon_decay_steps = 50000
# gpipd specific
per = true
alpha_per = 0.6
min_priority = 0.01
use_gpi = true
dyna = false
gpi_pd = true
# envelope specific
per_alpha = 0.6
envelope = true
num_sample_w = 4
# pcn specific
hidden_dim = 256
# scaling_factor = [1.0, 1.0]

[ppo_multiagent]
n_agents              = 6
total_episodes        = 10000   # total episodes to train (1 episode = 1 coating design)
warmup_episodes       = 500     # per objective
n_steps               = 256     # rollout length per agent before update
n_epochs              = 5       # optimization epochs per rollout
batch_size            = 64      # minibatch size for SGD
constraint_penalty    = 3.0
lr                    = 3e-4
gamma                 = 0.99
gae_lambda            = 0.95
clip_range            = 0.2
ent_coef              = 0.01
vf_coef               = 0.5
max_grad_norm         = 0.5
hidden                = [256, 256]
min_layers_before_air = 4
seed                  = 42
verbose               = 1
log_freq              = 500
plot_freq             = 5000

[ppo_sequential]
total_episodes        = 10000   # total episodes to train
warmup_episodes       = 500     # warmup episodes (no constraints)
epochs_per_step       = 200     # episodes per objective before switching
steps_per_objective   = 10      # constraint tightening steps
episodes_per_update   = 10      # episodes to collect before policy update
n_epochs              = 5       # optimization epochs per update
batch_size            = 64      # minibatch size for SGD
constraint_penalty    = 3.0
pareto_bonus          = 1.0     # reward bonus for improving hypervolume
lr                    = 3e-4
gamma                 = 0.99
gae_lambda            = 0.95
clip_range            = 0.2
ent_coef              = 0.01
vf_coef               = 0.5
max_grad_norm         = 0.5
hidden                = [256, 256]
min_layers_before_air = 4
mask_consecutive_materials = true
seed                  = 42
verbose               = 1
plot_freq             = 5000
